<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Gecko Films</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Barlow', sans-serif; }
  </style>
</head>
<body class="bg-neutral-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div style="font-family:'Barlow Condensed',sans-serif" class="font-black text-3xl text-neutral-800">
      Gecko Films
    </div>
    <div class="text-neutral-400 text-sm mt-1">Panel de administración</div>
  </div>

  <!-- Estado: formulario de envío -->
  <div id="view-form">
    <p class="text-neutral-500 text-sm text-center mb-6">
      Ingresa tu email y te enviaremos un link de acceso instantáneo.
    </p>
    <div class="mb-4">
      <label class="block text-xs font-semibold text-neutral-500 uppercase tracking-wide mb-1">
        Email
      </label>
      <input id="input-email" type="email" placeholder="tu@email.com"
        class="w-full border border-neutral-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#14cbb5] transition-colors"
        onkeydown="if(event.key==='Enter') enviarMagicLink()">
    </div>
    <button onclick="enviarMagicLink()" id="btn-send"
      class="w-full bg-[#14cbb5] hover:bg-[#0ea89e] text-white font-semibold py-3 rounded-lg transition-colors text-sm">
      Enviar Magic Link
    </button>
    <div id="error-msg" class="hidden mt-3 text-red-500 text-xs text-center"></div>
  </div>

  <!-- Estado: email enviado -->
  <div id="view-sent" class="hidden text-center">
    <div class="text-4xl mb-4">📬</div>
    <div class="font-semibold text-neutral-700 mb-2">¡Revisa tu email!</div>
    <p class="text-neutral-400 text-sm mb-6">
      Te enviamos un link de acceso a <span id="sent-email" class="font-semibold text-neutral-600"></span>.
      El link expira en 1 hora.
    </p>
    <button onclick="volverForm()"
      class="text-neutral-400 hover:text-neutral-600 text-sm underline transition-colors">
      Usar otro email
    </button>
  </div>

  <!-- Estado: sesión activa detectada -->
  <div id="view-session" class="hidden text-center">
    <div class="text-4xl mb-4">✅</div>
    <div class="font-semibold text-neutral-700 mb-1">Sesión activa</div>
    <p class="text-neutral-400 text-sm mb-1">Conectado como</p>
    <p class="font-semibold text-neutral-600 text-sm mb-6" id="session-email"></p>
    <a id="btn-goto" href="admin.html"
      class="block w-full bg-neutral-800 hover:bg-neutral-700 text-white font-semibold py-3 rounded-lg transition-colors text-sm text-center mb-3">
      Ir al admin
    </a>
    <button onclick="cerrarSesion()"
      class="w-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 font-semibold py-3 rounded-lg transition-colors text-sm">
      Cerrar sesión
    </button>
  </div>

</div>

<script>
// ── Config ───────────────────────────────────────
const SUPABASE_URL  = 'https://mvmlwelmilhitoetessx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bWx3ZWxtaWxoaXRvZXRlc3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTYxOTksImV4cCI6MjA5NjUzMjE5OX0.1MIsmOLAZM31b1BsysxII88U6JzOQWMp5kNDRiFmCnc';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// Página a la que volver después del login (?next=URL)
const nextUrl = new URLSearchParams(window.location.search).get('next') || 'admin.html';

// ── Al cargar: verificar si hay sesión o token en URL ─
window.addEventListener('load', async () => {
  // Supabase escribe el token en el hash de la URL al redirigir desde el magic link
  // El SDK lo detecta automáticamente con getSession()
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    mostrarSesion(session.user.email);
  }
});

// Escuchar cuando Supabase procesa el token del magic link
// (ocurre automáticamente cuando el usuario llega desde el email)
window.addEventListener('load', () => {
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      // Redirigir automáticamente a la página original después de 1s
      document.getElementById('view-form').classList.add('hidden');
      document.getElementById('view-sent').classList.add('hidden');
      document.getElementById('view-session').classList.remove('hidden');
      document.getElementById('session-email').textContent = session.user.email;
      document.getElementById('btn-goto').href = nextUrl;
      setTimeout(() => { window.location.href = nextUrl; }, 1200);
    }
  });
});

// ── Enviar magic link ────────────────────────────
async function enviarMagicLink() {
  const emailInput = document.getElementById('input-email');
  const email = emailInput.value.trim();
  if (!email) return;

  // Corregido: En tu HTML original el ID es 'btn-login'
  const btn = document.getElementById('btn-login');
  if (btn) {
    btn.disabled    = true;
    btn.textContent = 'Enviando...';
  }
  ocultarError();

  // Asegurar que tenemos acceso a 'sb' (el cliente Supabase global)
  if (typeof sb === 'undefined') {
    mostrarError("Error interno: El cliente de Supabase no se ha inicializado.");
    if (btn) {
      btn.disabled    = false;
      btn.textContent = 'Enviar Magic Link';
    }
    return;
  }

  // 1. Detectar si venimos de una página específica (como llamado_v2.html?id=1)
  const urlParams = new URLSearchParams(window.location.search);
  const nextParam = urlParams.get('next');
  
  let redirectTo;
  if (nextParam) {
    // Si existe 'next', usamos esa URL decodificada completa
    redirectTo = decodeURIComponent(nextParam);
  } else {
    // Si no existe, regresamos a la raíz limpia
    redirectTo = window.location.origin + window.location.pathname;
  }

  // 2. Enviar el OTP / Magic Link a Supabase
  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { 
        emailRedirectTo: redirectTo 
      },
    });

    if (error) {
      mostrarError(error.message);
      if (btn) {
        btn.disabled    = false;
        btn.textContent = 'Enviar Magic Link';
      }
      return;
    }

    // Si todo sale bien, mostramos la pantalla de éxito
    document.getElementById('sent-email').textContent = email;
    document.getElementById('view-form').classList.add('hidden');
    document.getElementById('view-sent').classList.remove('hidden');

  } catch (err) {
    mostrarError("Excepción al enviar: " + err.message);
    if (btn) {
      btn.disabled    = false;
      btn.textContent = 'Enviar Magic Link';
    }
  }
}

function mostrarError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function volverForm() {
  document.getElementById('view-sent').classList.add('hidden');
  document.getElementById('view-form').classList.remove('hidden');
  document.getElementById('input-email').value = '';
}

function mostrarSesion(email) {
  document.getElementById('view-form').classList.add('hidden');
  document.getElementById('view-sent').classList.add('hidden');
  document.getElementById('view-session').classList.remove('hidden');
  document.getElementById('session-email').textContent = email;
}

async function cerrarSesion() {
  await sb.auth.signOut();
  document.getElementById('view-session').classList.add('hidden');
  document.getElementById('view-form').classList.remove('hidden');
}
</script>
</body>
</html>
