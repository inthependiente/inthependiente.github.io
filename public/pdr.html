<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plan de Rodaje</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            condensed: ['Barlow Condensed', 'sans-serif'],
            body: ['Barlow', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Barlow', sans-serif; }
    .font-condensed { font-family: 'Barlow Condensed', sans-serif; }
    @media print {
      body { print-color-adjust: exact !important; }
      .page { box-shadow: none !important; margin: 0 !important; }
      #loading { display: none !important; }
      .no-print { display: none !important; }
    }
    .generating-pdf .no-print {
      display: none !important;
    }
    .html2pdf__page-break {
      height: 0 !important;
      border: none !important;
      background: transparent !important;
      margin: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      outline: none !important;
    }
  </style>
</head>
<body class="bg-gray-300 py-4 text-[10px]">

  <!-- ── LOADING OVERLAY ── -->
  <div id="loading" class="fixed inset-0 bg-gray-900/60 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl px-10 py-8 text-center shadow-2xl">
      <div class="font-condensed font-black text-2xl text-[#561d68] mb-1">PDR - Llamado APP</div>
      <div class="text-gray-500 text-sm mt-2">Cargando Plan de Rodaje...</div>
      <div class="mt-4 w-48 h-1.5 bg-gray-200 rounded-full overflow-hidden mx-auto">
        <div class="h-full bg-[#14cbb5] rounded-full animate-pulse w-3/4"></div>
      </div>
    </div>
  </div>

  <div class="page w-[216mm] mx-auto bg-white shadow-xl p-[4mm] rounded-sm">
    <!-- ══════════ SIMPLE HEADER ══════════ -->
    <div class="h-[50px] border-b border-neutral-300 pb-3 mb-4 flex items-center justify-between">
      <!-- Left side: logo and film company -->
      <div class="flex items-center gap-3">
        <div class="h-14 flex items-center">
          <img id="hdr-logo-prod" src="" class="h-12 max-w-[120px] object-contain hidden" alt="Logo Productora">
        </div>
        <div>
          <div class="font-condensed font-bold text-lg text-neutral-800 leading-tight uppercase" id="hdr-productora">—</div>
          <div class="text-[10px] text-gray-500 font-medium" id="hdr-director-container">Director: <span id="hdr-director" class="font-semibold text-neutral-700">Cargando...</span></div>
        </div>
      </div>

      <!-- Right side: shoot day details -->
      <div class="text-right flex flex-col items-end">
        <div class="text-[14px] tracking-wider" id="hdr-dod">
          —
        </div>
        <div class="font-bold text-[12px]" id="hdr-fecha">
          —
        </div>
        <div class="text-[12px] text-gray-500 font-semibold uppercase" id="hdr-campana">
          Campaña: —
        </div>
      </div>
    </div>

    <!-- ══════════ PLAN DE RODAJE ══════════ -->
    <div class="mb-1.5">
      <div class="bg-neutral-600 font-bold text-white text-[13px] tracking-wide uppercase text-center py-[4px] mb-1">
        Plan de Rodaje
      </div>
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-neutral-400 font-condensed font-bold text-[11px] uppercase">
            <th class="border border-neutral-600 px-1 py-[3px] text-center w-[25px]">Esc</th>
            <th class="border border-neutral-600 px-1 py-[3px] text-center w-[30px]">Plano</th>
            <th class="border border-neutral-600 px-1 py-[3px] text-center w-[36px]">Inicio</th>
            <th class="border border-neutral-600 px-1 py-[3px] text-left">Descripción</th>
            <th class="border border-neutral-600 px-1 py-[3px] text-left w-[110px]">Locación</th>
            <th class="border border-neutral-600 px-1 py-[3px] text-left w-[140px]">Notas</th>
            <th class="border border-neutral-600 px-1 py-[2px] text-center w-[140px]">Referencia</th>
          </tr>
        </thead>
        <tbody id="tbody-pdr">
          <tr><td colspan="7" class="text-center text-neutral-400 italic py-3 border">Cargando para ti...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Foot page -->
    <div class="text-center text-[8px] text-gray-300 italic mt-4 border-t border-gray-100 pt-2">
      PDR Export v1.0 by Gabriel Arauco
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://mvmlwelmilhitoetessx.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bWx3ZWxtaWxoaXRvZXRlc3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTYxOTksImV4cCI6MjA5NjUzMjE5OX0.1MIsmOLAZM31b1BsysxII88U6JzOQWMp5kNDRiFmCnc';
    const LLAMADO_ID    = parseInt(new URLSearchParams(window.location.search).get('id'), 10);
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    function formatFecha(v) {
      if (!v) return '—';
      const p = v.toString().split('-');
      return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : v;
    }

    function rowBg(i) { return i % 2 === 0 ? 'bg-white' : 'bg-neutral-100'; }

    async function fetchSupabase(tabla, filtros = {}, orden = null, select = '*') {
      const params = new URLSearchParams({ select });
      Object.entries(filtros).forEach(([col, val]) => params.append(col, `eq.${val}`));
      if (orden) params.append('order', `${orden}.asc`);
      const headers = { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${params}`, { headers });
      if (!res.ok) throw new Error(`Error ${res.status} en ${tabla}: ${await res.text()}`);
      return res.json();
    }

    async function loadLlamado() {
      if (!LLAMADO_ID) return;
      const data = await fetchSupabase('llamados', { id: LLAMADO_ID }, null, '*, proyectos(*)');
      if (!data.length) return;
      const l = data[0], p = l.proyectos || {};

      document.getElementById('hdr-productora').textContent = p.productora || 'Gecko Films';
      document.getElementById('hdr-dod').textContent = l.d_o_d || 'Día único';
      document.getElementById('hdr-fecha').textContent = formatFecha(l.fecha);
      document.getElementById('hdr-campana').textContent = `${p.campana || '—'}`;
      
      const logoImg = document.getElementById('hdr-logo-prod');
      if (p.logo_productora) {
        logoImg.src = p.logo_productora;
        logoImg.classList.remove('hidden');
      }

      document.title = `PDR ${p.campana || ''}`;
      return l.llamado_hora || '00:00';
    }

    async function loadDirector() {
      try {
        const rows = await fetchSupabase('crew_llamado', { llamado_id: LLAMADO_ID }, null, 'prioridad, crew(cargo, nombre)');
        const directorRow = rows.find(r => r.prioridad === 2 || Number(r.prioridad) === 2);
        const directorObj = directorRow ? (directorRow.crew || {}) : {};
        document.getElementById('hdr-director').textContent = directorObj.nombre || '—';
      } catch (e) {
        console.warn('Error loading director:', e);
        document.getElementById('hdr-director').textContent = '—';
      }
    }

    async function loadPDR(llamadoHora) {
      const pdrRows = await fetchSupabase('pdr', { llamado_id: LLAMADO_ID }, 'orden',
        'id, orden, duracion_min, shotlist(id, esc, plano, descripcion, cast_nombres, notas, referencia_urls, locaciones(locacion))');

      const tbody = document.getElementById('tbody-pdr');
      if (!pdrRows.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-neutral-400 italic py-3 border">Sin datos</td></tr>`;
        return;
      }

      let hBase = 0, mBase = 0;
      const hhmmMatch = (llamadoHora || '00:00').match(/^(\d{1,2}):(\d{2})/);
      if (hhmmMatch) {
         hBase = parseInt(hhmmMatch[1], 10);
         mBase = parseInt(hhmmMatch[2], 10);
         if (/pm/i.test(llamadoHora) && hBase < 12) hBase += 12;
         if (/am/i.test(llamadoHora) && hBase === 12) hBase = 0;
      }
      let minutos = hBase * 60 + mBase;
      const planosEspeciales = ['ES','ED'];

      tbody.innerHTML = pdrRows.map((r, i) => {
        const s = r.shotlist || {};
        const loc = s.locaciones || {};
        const inicioMin = minutos;
        minutos += (r.duracion_min || 0);
        const hI = Math.floor(inicioMin/60)%24, mI = inicioMin%60;
        const inicioStr = `${String(hI).padStart(2,'0')}:${String(mI).padStart(2,'0')}`;
        const plano = (s.plano||'').toUpperCase();

        if (planosEspeciales.includes(plano)) {
          return `<tr class="${rowBg(i)}">
            <td colspan="3" class="border border-neutral-600 px-2 py-[4px] bg-neutral-300 font-condensed font-bold text-[14px] tracking-wide text-center">
              ${inicioStr}
            </td>
            <td colspan="4" class="border border-neutral-600 px-2 py-[4px] bg-[#dfdfdf] font-bold text-[12px] tracking-wide uppercase text-center text-neutral-800">
              ${s.descripcion||''}
            </td>
          </tr>`;
        }

        const urls = s.referencia_urls ? s.referencia_urls.split(',').map(u => u.trim()).filter(Boolean) : [];
        const imgsHtml = urls.map(u => `<img src="${u}" class="max-w-full h-auto object-cover inline-block">`).join('');
        const refsHtml = imgsHtml || '<span class="text-neutral-300 italic text-[10px]">sin imágenes</span>';

        return `<tr class="${rowBg(i)} align-middle text-[11px]">
          <td class="border border-neutral-600 px-1 py-1 text-center font-condensed font-bold text-[12px]">${s.esc||''}</td>
          <td class="border border-neutral-600 px-1 py-1 text-center font-condensed font-bold text-[12px]">${s.plano||''}</td>
          <td class="border border-neutral-600 px-1 py-1 text-center font-condensed font-bold text-[12px]">${inicioStr}</td>
          <td class="border border-neutral-600 px-1 py-1 text-left whitespace-pre-wrap leading-relaxed">${s.descripcion||''}</td>
          <td class="border border-neutral-600 px-1 py-1 text-left">${loc.locacion||''}</td>
          <td class="border border-neutral-600 px-1 py-1 text-left whitespace-pre-wrap leading-relaxed">${s.notas||''}</td>
          <td class="border border-neutral-600 p-0 text-center">
            <div class="flex flex-col items-center justify-center">${refsHtml}</div>
          </td>
        </tr>`;
      }).join('');
    }

    async function init() {
      if (!LLAMADO_ID) {
        document.getElementById('loading').classList.add('hidden');
        document.body.innerHTML = `<div class="flex items-center justify-center h-screen text-center">
          <div><div class="text-2xl font-bold text-neutral-600 mb-2">No se especificó un ID de llamado</div>
          <div class="text-neutral-400">Usa la URL: pdr.html?id=ID</div></div></div>`;
        return;
      }
      try {
        const llamadoHora = await loadLlamado();
        await Promise.all([
          loadDirector(),
          loadPDR(llamadoHora)
        ]);
      } catch (err) {
        console.error(err);
        alert('Error al cargar datos del Plan de Rodaje: ' + err.message);
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    init();
  </script>

  <!-- Botones de Acción — visible solo en pantalla, no al imprimir -->
  <div class="no-print fixed bottom-4 left-4 z-50 flex items-center gap-2">
    <a id="btn-ver-llamado" href="#"
       class="flex items-center gap-2 bg-neutral-800 hover:bg-neutral-900 text-white text-[12px] font-bold px-4 py-2.5 rounded-full shadow-lg transition-all duration-150 transform hover:scale-105 decoration-none no-underline">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Llamado General
    </a>
    <button onclick="exportToPDF()"
       class="flex items-center gap-2 bg-rose-600 hover:bg-rose-700 text-white text-[12px] font-bold px-4 py-2.5 rounded-full shadow-lg transition-all duration-150 transform hover:scale-105 cursor-pointer border-none shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
      Exportar PDF
    </button>
  </div>

  <script>
    // Set dynamic link for Llamado General button
    const urlParamsForLlamado = new URLSearchParams(window.location.search);
    const llamadoIdParam = urlParamsForLlamado.get('id');
    if (llamadoIdParam) {
      document.getElementById('btn-ver-llamado').href = `llamado.html?id=${llamadoIdParam}`;
    } else {
      document.getElementById('btn-ver-llamado').style.display = 'none';
    }

    // Elegant toast notification system for pdr.html
    function showToast(msg, ok = true) {
      let bin = document.getElementById('toast-bin');
      if (!bin) {
        bin = document.createElement('div');
        bin.id = 'toast-bin';
        bin.className = 'fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none';
        document.body.appendChild(bin);
      }
      const el = document.createElement('div');
      el.className = `px-4 py-2.5 rounded-xl text-xs font-bold text-white shadow-lg pointer-events-auto transition-all transform translate-y-2 opacity-0 duration-200 ${ok ? 'bg-emerald-600' : 'bg-rose-600'}`;
      el.textContent = msg;
      bin.appendChild(el);
      setTimeout(() => {
        el.classList.remove('translate-y-2', 'opacity-0');
      }, 50);
      setTimeout(() => {
        el.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => el.remove(), 250);
      }, 4000);
    }

    // Export PDF dynamic function for pdr.html
    async function exportToPDF() {
      document.body.classList.add('generating-pdf');
      const element = document.querySelector('.page');
      const docTitle = document.title || 'Plan de Rodaje';
      const safeTitle = docTitle.replace(/[\\/:*?"<>|]/g, "_");
      const filename = `${safeTitle}.pdf`;
      
      // Sanitize the storage path specifically for Supabase compatible keys (letters, digits, dashes, underscores)
      const cleanStorageName = filename
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9.\-_]/g, "_")
        .replace(/_+/g, "_");
      const storagePath = `llamados/${cleanStorageName}`;
      
      const opt = {
        margin:       5, // 5mm is exactly 0.5 cm margin
        filename:     filename,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, allowTaint: true, scrollY: 0, scrollX: 0 },
        jsPDF:        { unit: 'mm', format: 'letter', orientation: 'portrait' },
        pagebreak:    { mode: ['css', 'legacy'] }
      };
      
      showToast('Generando archivo PDF...', true);
      
      // Temporarily scale page size to perfectly fit Letter sheet printable width (215.9mm - 10mm margins = 205.9mm)
      const originalWidth = element.style.width;
      const originalMaxWidth = element.style.maxWidth;
      const originalBoxSizing = element.style.boxSizing;
      element.style.width = '205.9mm';
      element.style.maxWidth = '205.9mm';
      element.style.boxSizing = 'border-box';
      
      // Force immediate layout reflow so getBoundingClientRect uses the new scaled widths
      element.offsetHeight;
      
      // Patch getComputedStyle to bypass the oklch parse error of html2canvas
      const originalGetComputedStyle = window.getComputedStyle;
      
      function oklchToRgb(l, c, h, a = 1) {
        const hRad = (h * Math.PI) / 180;
        const L = l + 0.3963377774 * c * Math.cos(hRad) + 0.2158037573 * c * Math.sin(hRad);
        const M = l - 0.1055613458 * c * Math.cos(hRad) - 0.0638541728 * c * Math.sin(hRad);
        const S = l - 0.0894841775 * c * Math.cos(hRad) - 1.2914855480 * c * Math.sin(hRad);
        
        const l_ = L * L * L;
        const m_ = M * M * M;
        const s_ = S * S * S;
        
        let r = +4.0767416621 * l_ - 3.3077115913 * m_ + 0.2309699292 * s_;
        let g = -1.2684380046 * l_ + 2.5090391104 * m_ - 0.2406011058 * s_;
        let b = -0.0041960863 * l_ - 0.7034186147 * m_ + 1.7076186100 * s_;
        
        const fn = (x) => x > 0.0031308 ? 1.055 * Math.pow(x, 1/2.4) - 0.055 : 12.92 * x;
        
        r = Math.round(Math.max(0, Math.min(1, fn(r))) * 255);
        g = Math.round(Math.max(0, Math.min(1, fn(g))) * 255);
        b = Math.round(Math.max(0, Math.min(1, fn(b))) * 255);
        
        return a === 1 ? `rgb(${r}, ${g}, ${b})` : `rgba(${r}, ${g}, ${b}, ${a})`;
      }

      function replaceOklchWithRgb(str) {
        if (typeof str !== 'string' || !str.includes('oklch')) return str;
        return str.replace(/oklch\(([-+\d.%]+)\s+([-+\d.%]+)\s+([-+\d.%]+)(?:\s*\/\s*([-+\d.%]+))?\)/g, (match, lStr, cStr, hStr, aStr) => {
          const l = lStr.endsWith('%') ? parseFloat(lStr) / 100 : parseFloat(lStr);
          const c = cStr.endsWith('%') ? parseFloat(cStr) / 100 : parseFloat(cStr);
          const h = hStr.endsWith('%') ? (parseFloat(hStr) * 3.6) : parseFloat(hStr);
          let a = 1;
          if (aStr) {
            a = aStr.endsWith('%') ? parseFloat(aStr) / 100 : parseFloat(aStr);
          }
          return oklchToRgb(l, c, h, a);
        });
      }

      window.getComputedStyle = function(el, pseudoElt) {
        const style = originalGetComputedStyle(el, pseudoElt);
        return new Proxy(style, {
          get(target, prop) {
            const val = target[prop];
            if (typeof val === 'function') {
              if (prop === 'getPropertyValue') {
                return function(key) {
                  const raw = target.getPropertyValue(key);
                  return replaceOklchWithRgb(raw);
                }
              }
              return val.bind(target);
            }
            return replaceOklchWithRgb(val);
          }
        });
      };
      
      try {
        // Generate and download locally
        const worker = html2pdf().set(opt).from(element).toPdf();
        const blob = await worker.output('blob');
        await worker.save();
        
        // Restore elements width & computed styles
        element.style.width = originalWidth;
        element.style.maxWidth = originalMaxWidth;
        element.style.boxSizing = originalBoxSizing;
        window.getComputedStyle = originalGetComputedStyle;
        document.body.classList.remove('generating-pdf');
        
        showToast('Buscando sesión activa para respaldar...', true);
        const { data: { session } } = await sb.auth.getSession();
        
        if (!session) {
          showToast('Descargado localmente. Inicia sesión si deseas respaldarlo en la nube.', false);
          return;
        }
        
        // Authenticate the sb client using active token to bypass anonymous RLS failures
        if (typeof sb !== 'undefined') {
          await sb.auth.setSession({
            access_token: session.access_token,
            refresh_token: ''
          });
        }
        
        showToast('Subiendo copia al bucket "referencias" (carpeta "llamados")...', true);
        
        // Upload/overwrite to Supabase references storage bucket
        const { data, error } = await sb.storage
          .from("referencias")
          .upload(storagePath, blob, {
            contentType: 'application/pdf',
            upsert: true
          });
          
        if (error) {
          throw error;
        }
        
        showToast('¡PDF guardado en el bucket (carpeta llamados)! ✓');
      } catch (err) {
        element.style.width = originalWidth;
        element.style.maxWidth = originalMaxWidth;
        element.style.boxSizing = originalBoxSizing;
        window.getComputedStyle = originalGetComputedStyle;
        document.body.classList.remove('generating-pdf');
        console.error('PDF generation error:', err);
        showToast('Descargado localmente. Error al respaldar: ' + err.message, false);
      }
    }
  </script>
</body>
</html>
