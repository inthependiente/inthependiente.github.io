<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — LlamadoAPP</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Barlow', sans-serif; }
  </style>
</head>
<body class="bg-neutral-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">

    <div class="text-center mb-8">
      <div style="font-family:'Barlow Condensed',sans-serif" class="font-black text-3xl text-neutral-800">
        LlamadoAPP
      </div>
      <div class="text-neutral-400 text-sm mt-1">Panel de administración</div>
    </div>

    <form id="view-form" onsubmit="loginConEmailPassword(event)" class="space-y-4">
      <p class="text-neutral-550 text-sm text-center mb-4">
        Ingresa con tu correo y contraseña registrados.
      </p>

      <div>
        <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Correo Electrónico</label>
        <input type="email" id="input-email" required placeholder="ejemplo@correo.com"
          class="w-full border border-neutral-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-neutral-800 focus:outline-hidden bg-neutral-50" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Contraseña</label>
        <input type="password" id="input-password" required placeholder="••••••••"
          class="w-full border border-neutral-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-neutral-800 focus:outline-hidden bg-neutral-50" />
      </div>

      <button type="submit" id="btn-send"
        class="w-full bg-neutral-800 hover:bg-neutral-700 text-white font-semibold py-3 rounded-lg transition-colors text-sm shadow-sm cursor-pointer mt-4">
        Iniciar Sesión
      </button>
      
      <div id="error-msg" class="hidden mt-3 text-red-500 text-xs text-center font-medium"></div>
    </form>

    <div id="view-session" class="hidden text-center">
      <div class="text-4xl mb-4">✅</div>
      <div class="font-semibold text-neutral-700 mb-1">Sesión activa</div>
      <p class="text-neutral-400 text-sm mb-1">Conectado como</p>
      <p class="font-semibold text-neutral-600 text-sm mb-6 pb-2 border-b border-neutral-100" id="session-email"></p>
      <a id="btn-goto" href="admin.html"
        class="block w-full bg-neutral-800 hover:bg-neutral-700 text-white font-semibold py-3 rounded-lg transition-colors text-sm text-center mb-3">
        Ir al admin
      </a>
      <button onclick="cerrarSesion()"
        class="w-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 font-semibold py-3 rounded-lg transition-colors text-sm">
        Cerrar sesión
      </button>
    </div>

  </div>

<script>
// ── Config ───────────────────────────────────────
const SUPABASE_URL  = 'https://mvmlwelmilhitoetessx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bWx3ZWxtaWxoaXRvZXRlc3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTYxOTksImV4cCI6MjA5NjUzMjE5OX0.1MIsmOLAZM31b1BsysxII88U6JzOQWMp5kNDRiFmCnc';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// Página a la que volver después del login (?next=URL)
const nextUrl = new URLSearchParams(window.location.search).get('next') || 'admin.html';

// ── Al cargar: verificar si hay sesión o token en URL ─
window.addEventListener('load', async () => {
  // Supabase escribe el token en el hash de la URL al redirigir desde el magic link
  // El SDK lo detecta automáticamente con getSession()
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    mostrarSesion(session.user.email);
  }
});

// Escuchar cambios de sesión
window.addEventListener('load', () => {
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      // Redirigir automáticamente a la página original después de 1s
      const formEl = document.getElementById('view-form');
      if (formEl) formEl.classList.add('hidden');
      const sentEl = document.getElementById('view-sent');
      if (sentEl) sentEl.classList.add('hidden');
      
      const sessionEl = document.getElementById('view-session');
      if (sessionEl) sessionEl.classList.remove('hidden');
      
      const emailEl = document.getElementById('session-email');
      if (emailEl) emailEl.textContent = session.user.email;
      
      const gotoEl = document.getElementById('btn-goto');
      if (gotoEl) gotoEl.href = nextUrl;
      setTimeout(() => { window.location.href = nextUrl; }, 1200);
    }
  });
});

// ── Iniciar sesión con Email y Contraseña ────────
async function loginConEmailPassword(event) {
  event.preventDefault();
  const btn = document.getElementById('btn-send');
  if (btn) {
    btn.disabled = true;
    btn.innerText = 'Iniciando sesión...';
  }

  const errorEl = document.getElementById('error-msg');
  if (errorEl) errorEl.classList.add('hidden');

  const email = document.getElementById('input-email').value.trim();
  const password = document.getElementById('input-password').value.trim();

  try {
    const { data, error } = await sb.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      mostrarError("Error: " + error.message);
      if (btn) {
        btn.disabled = false;
        btn.innerText = 'Iniciar Sesión';
      }
    }
  } catch (err) {
    mostrarError("Excepción: " + err.message);
    if (btn) {
      btn.disabled = false;
      btn.innerText = 'Iniciar Sesión';
    }
  }
}

function mostrarError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function volverForm() {
  const sentEl = document.getElementById('view-sent');
  if (sentEl) sentEl.classList.add('hidden');
  const formEl = document.getElementById('view-form');
  if (formEl) formEl.classList.remove('hidden');
  const inputEmail = document.getElementById('input-email');
  if (inputEmail) inputEmail.value = '';
}

function mostrarSesion(email) {
  const formEl = document.getElementById('view-form');
  if (formEl) formEl.classList.add('hidden');
  const sentEl = document.getElementById('view-sent');
  if (sentEl) sentEl.classList.add('hidden');
  const sessionEl = document.getElementById('view-session');
  if (sessionEl) sessionEl.classList.remove('hidden');
  const emailEl = document.getElementById('session-email');
  if (emailEl) emailEl.textContent = email;
}

async function cerrarSesion() {
  await sb.auth.signOut();
  document.getElementById('view-session').classList.add('hidden');
  document.getElementById('view-form').classList.remove('hidden');
}
</script>
</body>
</html>
