<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Gecko Films</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Barlow', sans-serif; }
    .font-condensed { font-family: 'Barlow Condensed', sans-serif; }
    .fade-in { animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    input, select, textarea { outline: none; }
    input:focus, select:focus, textarea:focus { ring: 2px; }
  </style>
</head>
<body class="bg-neutral-100 text-[13px] text-neutral-800">

<!-- ── TOAST ── -->
<div id="toast" class="fixed top-4 right-4 z-50 hidden">
  <div id="toast-inner" class="px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium"></div>
</div>

<!-- ── MODAL CONFIRM ── -->
<div id="modal" class="fixed inset-0 bg-black/40 z-40 hidden flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-2xl p-6 w-80">
    <div class="font-bold text-[15px] mb-2" id="modal-title">¿Confirmar?</div>
    <div class="text-neutral-500 mb-5" id="modal-msg"></div>
    <div class="flex gap-2 justify-end">
      <button onclick="modalCancel()" class="px-4 py-2 rounded-lg bg-neutral-100 hover:bg-neutral-200 font-medium">Cancelar</button>
      <button id="modal-confirm-btn" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white font-medium">Eliminar</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" class="max-w-5xl mx-auto px-4 py-6"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const SUPABASE_URL  = 'https://mvmlwelmilhitoetessx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bWx3ZWxtaWxoaXRvZXRlc3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTYxOTksImV4cCI6MjA5NjUzMjE5OX0.1MIsmOLAZM31b1BsysxII88U6JzOQWMp5kNDRiFmCnc';
const LLAMADO_FILE  = 'llamado_supabase.html'; // nombre de tu archivo de llamado

// ── Estado de navegación ─────────────────────────
let STATE = { view: 'proyectos', proyecto: null, llamado: null };

// ═══════════════════════════════════════════════════
//  SUPABASE HELPERS
// ═══════════════════════════════════════════════════
const headers = {
  'apikey':        SUPABASE_ANON,
  'Authorization': `Bearer ${SUPABASE_ANON}`,
  'Content-Type':  'application/json',
  'Prefer':        'return=representation',
};

async function sbGet(tabla, filtros = {}, orden = null) {
  const p = new URLSearchParams();
  Object.entries(filtros).forEach(([k, v]) => p.append(k, `eq.${v}`));
  if (orden) p.append('order', `${orden}.asc`);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${p}`, { headers });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbInsert(tabla, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, {
    method: 'POST', headers, body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbUpdate(tabla, id, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?id=eq.${id}`, {
    method: 'PATCH', headers, body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbDelete(tabla, id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?id=eq.${id}`, {
    method: 'DELETE', headers
  });
  if (!res.ok) throw new Error(await res.text());
}

async function sbUpload(file) {
  const ext  = file.name.split('.').pop();
  const name = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const res  = await fetch(`${SUPABASE_URL}/storage/v1/object/referencias/${name}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': file.type },
    body: file,
  });
  if (!res.ok) throw new Error(await res.text());
  return `${SUPABASE_URL}/storage/v1/object/public/referencias/${name}`;
}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function toast(msg, tipo = 'ok') {
  const t  = document.getElementById('toast');
  const ti = document.getElementById('toast-inner');
  ti.textContent = msg;
  ti.className   = `px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium ${tipo === 'ok' ? 'bg-green-600' : 'bg-red-600'}`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

let _modalCb = null;
function confirm(title, msg, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent   = msg;
  document.getElementById('modal').classList.remove('hidden');
  _modalCb = cb;
}
function modalCancel() { document.getElementById('modal').classList.add('hidden'); _modalCb = null; }
document.getElementById('modal-confirm-btn').onclick = () => { modalCancel(); if (_modalCb) _modalCb(); };

function loading(el, show) {
  if (show) { el.disabled = true; el._txt = el.textContent; el.textContent = 'Guardando...'; }
  else       { el.disabled = false; el.textContent = el._txt || 'Guardar'; }
}

// Campos comunes
const inp  = (id, val='', ph='', type='text', extra='') =>
  `<input id="${id}" type="${type}" value="${esc(val)}" placeholder="${ph}" ${extra}
    class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-[13px] focus:border-neutral-500 bg-white">`;
const sel  = (id, opts, val='') =>
  `<select id="${id}" class="w-full border border-neutral-300 rounded-lg px-3 py-2 text-[13px] focus:border-neutral-500 bg-white">
    ${opts.map(o => `<option value="${o.v}" ${o.v==val?'selected':''}>${o.l}</option>`).join('')}
  </select>`;
const lbl  = (text) => `<label class="block text-[11px] font-semibold text-neutral-500 uppercase tracking-wide mb-1">${text}</label>`;
const card = (content) => `<div class="bg-white rounded-xl shadow-sm border border-neutral-200 p-5 mb-4 fade-in">${content}</div>`;
const secTitle = (t) => `<div class="font-condensed font-bold text-[16px] uppercase tracking-wide text-neutral-700 border-b border-neutral-200 pb-2 mb-4">${t}</div>`;
const btn  = (txt, onclick, color='bg-neutral-800 hover:bg-neutral-700 text-white') =>
  `<button onclick="${onclick}" class="${color} px-4 py-2 rounded-lg font-medium transition-colors text-[13px]">${txt}</button>`;
const btnSm= (txt, onclick, color='bg-neutral-100 hover:bg-neutral-200 text-neutral-700') =>
  `<button onclick="${onclick}" class="${color} px-3 py-1.5 rounded-lg font-medium transition-colors text-[12px]">${txt}</button>`;

function esc(v) { return (v||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function val(id) { return (document.getElementById(id)?.value || '').trim(); }

function render(html) {
  document.getElementById('app').innerHTML = html;
}

// ── Breadcrumb ──────────────────────────────────
function breadcrumb() {
  const parts = [`<button onclick="goProyectos()" class="text-neutral-400 hover:text-neutral-700 font-medium">Proyectos</button>`];
  if (STATE.proyecto) parts.push(`<button onclick="goProyecto(STATE.proyecto)" class="text-neutral-400 hover:text-neutral-700 font-medium">${esc(STATE.proyecto.nombre)}</button>`);
  if (STATE.llamado)  parts.push(`<span class="text-neutral-700 font-medium">Llamado ${STATE.llamado.dia_numero || 1}</span>`);
  return `<div class="flex items-center gap-2 text-[12px] mb-5">
    ${parts.join('<span class="text-neutral-300">/</span>')}
  </div>`;
}

// ═══════════════════════════════════════════════════
//  VISTA 1 — PROYECTOS
// ═══════════════════════════════════════════════════
async function goProyectos() {
  STATE = { view: 'proyectos', proyecto: null, llamado: null };
  render(`<div class="animate-pulse text-neutral-400 py-10 text-center">Cargando...</div>`);
  const proyectos = await sbGet('proyectos', {}, 'creado_en');
  render(`
    <div class="flex items-center justify-between mb-6">
      <div class="font-condensed font-black text-[28px] text-neutral-800">Gecko Films <span class="text-neutral-400 font-normal text-[18px]">— Admin</span></div>
      ${btn('+ Nuevo Proyecto', 'showFormProyecto()')}
    </div>
    <div id="form-proyecto-container"></div>
    ${proyectos.length === 0
      ? `<div class="text-center text-neutral-400 py-16">No hay proyectos aún. Crea el primero.</div>`
      : proyectos.map(p => `
        <div class="bg-white rounded-xl shadow-sm border border-neutral-200 p-4 mb-3 flex items-center gap-4 fade-in">
          ${p.logo_url ? `<img src="${esc(p.logo_url)}" class="h-10 w-16 object-contain rounded">` : `<div class="h-10 w-16 bg-neutral-100 rounded flex items-center justify-center text-neutral-400 text-[10px]">sin logo</div>`}
          <div class="flex-1">
            <div class="font-bold text-[15px]">${esc(p.nombre)}</div>
            <div class="text-neutral-400 text-[12px]">${esc(p.cliente || '—')}</div>
          </div>
          <div class="flex gap-2">
            ${btnSm('Abrir', `goProyecto(${JSON.stringify(p).replace(/"/g,'&quot;')})`,'bg-neutral-800 hover:bg-neutral-700 text-white')}
            ${btnSm('Editar', `showFormProyecto(${JSON.stringify(p).replace(/"/g,'&quot;')})`)}
            ${btnSm('Eliminar', `eliminarProyecto('${p.id}','${esc(p.nombre)}')`, 'bg-red-50 hover:bg-red-100 text-red-600')}
          </div>
        </div>`).join('')
    }
  `);
}

function showFormProyecto(p = null) {
  const isEdit = !!p;
  document.getElementById('form-proyecto-container').innerHTML = card(`
    ${secTitle(isEdit ? 'Editar Proyecto' : 'Nuevo Proyecto')}
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>${lbl('Nombre del proyecto')}${inp('fp-nombre', p?.nombre, 'Ej: Tigo Prepago 2026')}</div>
      <div>${lbl('Cliente')}${inp('fp-cliente', p?.cliente, 'Ej: Tigo Bolivia')}</div>
      <div>${lbl('Color cliente (hex)')}${inp('fp-color-cliente', p?.color_cliente, '#561d68')}</div>
      <div>${lbl('Color campaña (hex)')}${inp('fp-color-campana', p?.color_campana, '#14cbb5')}</div>
      <div>${lbl('URL logo cliente')}${inp('fp-logo-url', p?.logo_url, 'https://...')}</div>
      <div>${lbl('O subir logo cliente')}
        <input type="file" id="fp-logo-file" accept="image/*" class="w-full text-[12px] text-neutral-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-neutral-100 file:text-neutral-700 file:font-medium">
      </div>
    </div>
    <div class="flex gap-2">
      ${btn(isEdit ? 'Guardar cambios' : 'Crear proyecto', `guardarProyecto(${isEdit ? `'${p.id}'` : 'null'})`, 'bg-neutral-800 hover:bg-neutral-700 text-white')}
      ${btnSm('Cancelar', 'document.getElementById("form-proyecto-container").innerHTML=""')}
    </div>
  `);
}

async function guardarProyecto(id) {
  const btn = event.target;
  loading(btn, true);
  try {
    let logoUrl = val('fp-logo-url');
    const file  = document.getElementById('fp-logo-file')?.files[0];
    if (file) { logoUrl = await sbUpload(file); toast('Logo subido ✓'); }

    const data = {
      nombre:        val('fp-nombre'),
      cliente:       val('fp-cliente'),
      color_cliente: val('fp-color-cliente'),
      color_campana: val('fp-color-campana'),
      logo_url:      logoUrl,
    };
    if (!data.nombre) { toast('El nombre es obligatorio', 'err'); loading(btn, false); return; }

    if (id) await sbUpdate('proyectos', id, data);
    else    await sbInsert('proyectos', data);

    toast(id ? 'Proyecto actualizado ✓' : 'Proyecto creado ✓');
    await goProyectos();
  } catch(e) { toast('Error: ' + e.message, 'err'); loading(btn, false); }
}

async function eliminarProyecto(id, nombre) {
  confirm('Eliminar proyecto', `¿Eliminar "${nombre}" y todos sus llamados?`, async () => {
    try { await sbDelete('proyectos', id); toast('Proyecto eliminado'); await goProyectos(); }
    catch(e) { toast('Error: ' + e.message, 'err'); }
  });
}

// ═══════════════════════════════════════════════════
//  VISTA 2 — DETALLE PROYECTO + LLAMADOS
// ═══════════════════════════════════════════════════
async function goProyecto(p) {
  if (typeof p === 'string') p = JSON.parse(p);
  STATE = { view: 'proyecto', proyecto: p, llamado: null };
  render(`<div class="animate-pulse text-neutral-400 py-10 text-center">Cargando...</div>`);
  const llamados = await sbGet('llamados', { proyecto_id: p.id }, 'dia_numero');
  render(`
    ${breadcrumb()}
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="font-condensed font-black text-[24px]">${esc(p.nombre)}</div>
        <div class="text-neutral-400">${esc(p.cliente || '')}</div>
      </div>
      ${btn('+ Nuevo Llamado', `showFormLlamado(null,'${p.id}')`)}
    </div>
    <div id="form-llamado-container"></div>
    ${llamados.length === 0
      ? `<div class="text-center text-neutral-400 py-10">No hay llamados. Crea el primero.</div>`
      : llamados.map(l => `
        <div class="bg-white rounded-xl shadow-sm border border-neutral-200 p-4 mb-3 flex items-center gap-4 fade-in">
          <div class="bg-neutral-800 text-white font-condensed font-black text-[22px] w-12 h-12 rounded-lg flex items-center justify-center">${l.dia_numero || '?'}</div>
          <div class="flex-1">
            <div class="font-bold">Día ${l.dia_numero || '?'} de ${l.dia_total || '?'}</div>
            <div class="text-neutral-400 text-[12px]">${esc(l.fecha || '—')} · Llamado: ${esc(l.llamado_hora || '—')} · ${esc(l.ciudad || '—')}</div>
          </div>
          <div class="flex gap-2">
            <a href="${LLAMADO_FILE}?id=${l.id}" target="_blank" class="bg-[#14cbb5] hover:bg-[#12b8a3] text-white px-3 py-1.5 rounded-lg font-medium text-[12px] transition-colors">Ver llamado ↗</a>
            ${btnSm('Editar', `goLlamado(${JSON.stringify(l).replace(/"/g,'&quot;')},${JSON.stringify(p).replace(/"/g,'&quot;')})`,'bg-neutral-800 hover:bg-neutral-700 text-white')}
            ${btnSm('Eliminar', `eliminarLlamado('${l.id}')`, 'bg-red-50 hover:bg-red-100 text-red-600')}
          </div>
        </div>`).join('')
    }
  `);
}

    ${secTitle(l ? 'Editar Llamado' : 'Nuevo Llamado')}

      <div>${lbl('AD')}${inp('fl-ad', l?.ad, '')}</div>

      <div>${lbl('Prod. Ejecutivo')}${inp('fl-prodejec', l?.prod_ejecutivo, '')}</div>

      <div>${lbl('Jefe de Prod.')}${inp('fl-jefeprod', l?.jefe_prod, '')}</div>

      <div>${lbl('Asist. de Prod.')}${inp('fl-asistprod', l?.asist_prod, '')}</div>

    </div>
    <div class="mb-4">${lbl('Notas generales')}

    </div>
    <div class="flex gap-2">

async function guardarLlamado(id, proyectoId) {
  const btn = event.target;
  loading(btn, true);
  try {
    const data = {
      proyecto_id:        proyectoId,
      dia_numero:         parseInt(val('fl-dia')) || 1,
      dia_total:          parseInt(val('fl-dia-total')) || 1,
      fecha:              val('fl-fecha'),
      llamado_hora:       val('fl-llamado-hora'),
      ciudad:             val('fl-ciudad'),
      desayuno:           val('fl-desayuno'),
      almuerzo:           val('fl-almuerzo'),
      cena:               val('fl-cena'),
      notas:              val('fl-notas'),
      director:           val('fl-director'),
      ad:                 val('fl-ad'),
      ad_tel:             val('fl-ad-tel'),
      prod_ejecutivo:     val('fl-prodejec'),
      prod_ejecutivo_tel: val('fl-prodejec-tel'),
      jefe_prod:          val('fl-jefeprod'),
      jefe_prod_tel:      val('fl-jefeprod-tel'),
      asist_prod:         val('fl-asistprod'),
      asist_prod_tel:     val('fl-asistprod-tel'),
      casting:            val('fl-casting'),
      casting_tel:        val('fl-casting-tel'),

    else    await sbInsert('llamados', data);

    await goProyecto(STATE.proyecto);
  } catch(e) { toast('Error: ' + e.message, 'err'); loading(btn, false); }
}

async function eliminarLlamado(id) {
  confirm('Eliminar llamado', '¿Eliminar este llamado y todos sus datos?', async () => {
    try { await sbDelete('llamados', id); toast('Llamado eliminado'); await goProyecto(STATE.proyecto); }
    catch(e) { toast('Error: ' + e.message, 'err'); }
  });
}

// ═══════════════════════════════════════════════════
//  VISTA 3 — DETALLE LLAMADO (todas las tablas)
// ═══════════════════════════════════════════════════
async function goLlamado(l, p) {
  if (typeof l === 'string') l = JSON.parse(l);
  if (typeof p === 'string') p = JSON.parse(p);
  STATE = { view: 'llamado', proyecto: p, llamado: l };
  render(`<div class="animate-pulse text-neutral-400 py-10 text-center">Cargando...</div>`);

  const [cronograma, clienteAgencia, talento, crew, pdr] = await Promise.all([
    sbGet('cronograma',      { llamado_id: l.id }, 'orden'),
    sbGet('cliente_agencia', { llamado_id: l.id }),
    sbGet('talento',         { llamado_id: l.id }, 'orden'),
    sbGet('crew',            { llamado_id: l.id }, 'orden'),
    sbGet('pdr',             { llamado_id: l.id }, 'orden'),
  ]);

  render(`
    ${breadcrumb()}
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="font-condensed font-black text-[22px]">Día ${l.dia_numero} de ${l.dia_total}</div>
        <div class="text-neutral-400 text-[12px]">${esc(l.fecha)} · ${esc(l.llamado_hora)} · ${esc(l.ciudad||'')}</div>
      </div>
      <div class="flex gap-2">
        ${btnSm('Editar datos generales', `showFormLlamado(${JSON.stringify(l).replace(/"/g,'&quot;')},null)`)}
        <a href="${LLAMADO_FILE}?id=${l.id}" target="_blank" class="bg-[#14cbb5] hover:bg-[#12b8a3] text-white px-3 py-1.5 rounded-lg font-medium text-[12px] transition-colors">Ver llamado ↗</a>
      </div>
    </div>
    <div id="form-llamado-container"></div>

    <!-- CRONOGRAMA -->
    ${seccionTabla('Cronograma', 'cronograma', cronograma, l.id, [
      { k:'escena',        label:'Escena',       type:'text'   },
      { k:'hora',          label:'Hora',         type:'text', ph:'08:00' },
      { k:'descripcion',   label:'Descripción',  type:'text'   },
      { k:'cast_nombres',  label:'Cast',         type:'text'   },
      { k:'int_ext',       label:'Int/Ext',      type:'select', opts:[{v:'EXT',l:'EXT'},{v:'INT',l:'INT'}] },
      { k:'d_n',           label:'D/N',          type:'select', opts:[{v:'D',l:'D'},{v:'N',l:'N'}] },
      { k:'locacion',      label:'Locación',     type:'text'   },

    ${seccionTabla('Talento', 'talento', talento, l.id, [

      { k:'es_especial',    label:'Especial',   type:'select', opts:[{v:'false',l:'No'},{v:'true',l:'Sí'}] },
      { k:'descripcion',    label:'Descripción',type:'text'   },
      { k:'cast_nombres',   label:'Cast',       type:'text'   },
      { k:'locacion',       label:'Locación',   type:'text'   },
      { k:'notas',          label:'Notas',      type:'text'   },

      { k:'referencia_urls',label:'Refs (URLs)',type:'image'  },

  `);
}

// ── Sección tabla genérica ───────────────────────
function seccionTabla(titulo, tabla, rows, llamadoId, cols) {
  const colsStr = encodeURIComponent(JSON.stringify(cols));
  return `
  <div class="bg-white rounded-xl shadow-sm border border-neutral-200 mb-4 fade-in overflow-hidden">
    <div class="flex items-center justify-between px-5 py-3 border-b border-neutral-100">
      <div class="font-condensed font-bold text-[15px] uppercase tracking-wide text-neutral-700">${titulo}</div>
      <button onclick="agregarFila('${tabla}','${llamadoId}',decodeURIComponent('${colsStr}'))"
        class="bg-neutral-800 hover:bg-neutral-700 text-white px-3 py-1.5 rounded-lg font-medium text-[12px] transition-colors">+ Agregar fila</button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full border-collapse text-[12px]" id="tbl-${tabla}">
        <thead>
          <tr class="bg-neutral-50 text-neutral-500 text-[11px] uppercase font-semibold tracking-wide">
            ${cols.map(c => `<th class="px-3 py-2 text-left border-b border-neutral-100 whitespace-nowrap">${c.label}</th>`).join('')}
            <th class="px-3 py-2 text-left border-b border-neutral-100 w-[80px]">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-${tabla}">
          ${rows.length === 0
            ? `<tr><td colspan="${cols.length+1}" class="text-center text-neutral-400 italic py-4">Sin registros</td></tr>`
            : rows.map(r => filaTabla(tabla, r, cols, llamadoId)).join('')
          }
        </tbody>
      </table>
    </div>
  </div>`;
}

function filaTabla(tabla, r, cols, llamadoId) {
  const colsStr = encodeURIComponent(JSON.stringify(cols));
  return `
  <tr id="row-${r.id}" class="border-b border-neutral-50 hover:bg-neutral-50">
    ${cols.map(c => {
      const v = r[c.k] ?? '';
      if (c.type === 'image') {
        const urls = v.toString().split(',').map(s=>s.trim()).filter(Boolean);
        return `<td class="px-3 py-2">
          <div class="flex gap-1 flex-wrap mb-1">
            ${urls.map(u => `<img src="${esc(u)}" class="h-10 w-14 object-cover rounded border">`).join('')}
          </div>
          <div class="text-[11px] text-neutral-400 truncate max-w-[160px]">${esc(v)}</div>
        </td>`;
      }
      return `<td class="px-3 py-2 max-w-[140px] truncate">${esc(v.toString())}</td>`;
    }).join('')}
    <td class="px-3 py-2">
      <div class="flex gap-1">
        <button onclick="editarFila('${tabla}','${r.id}',decodeURIComponent('${colsStr}'),'${llamadoId}')"
          class="bg-neutral-100 hover:bg-neutral-200 text-neutral-700 px-2 py-1 rounded text-[11px] font-medium">Editar</button>
        <button onclick="eliminarFila('${tabla}','${r.id}','${llamadoId}',decodeURIComponent('${colsStr}'))"
          class="bg-red-50 hover:bg-red-100 text-red-600 px-2 py-1 rounded text-[11px] font-medium">✕</button>
      </div>
    </td>
  </tr>`;
}

// ── Formulario inline de fila ────────────────────
function formFila(tabla, r, cols, llamadoId, isEdit) {
  const colsStr = encodeURIComponent(JSON.stringify(cols));
  const id = r?.id || '';
  return `
  <tr id="form-row-${tabla}" class="bg-neutral-50 border-b border-neutral-200">
    ${cols.map(c => {
      const v = r?.[c.k] ?? '';
      let field = '';
      if (c.type === 'select') {
        field = `<select id="fr-${tabla}-${c.k}" class="w-full border border-neutral-300 rounded px-2 py-1 text-[12px] bg-white min-w-[80px]">
          ${(c.opts||[]).map(o => `<option value="${o.v}" ${o.v==v?'selected':''}>${o.l}</option>`).join('')}
        </select>`;
      } else if (c.type === 'image') {
        field = `
          <input type="text" id="fr-${tabla}-${c.k}" value="${esc(v)}" placeholder="URL(s) separadas por coma"
            class="w-full border border-neutral-300 rounded px-2 py-1 text-[12px] mb-1 min-w-[160px]">
          <input type="file" id="fr-${tabla}-${c.k}-file" accept="image/*" multiple
            class="w-full text-[11px] text-neutral-400 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-neutral-200 file:text-neutral-700">
        `;
      } else {
        field = `<input type="${c.type||'text'}" id="fr-${tabla}-${c.k}" value="${esc(v)}" placeholder="${esc(c.ph||'')}"
          class="w-full border border-neutral-300 rounded px-2 py-1 text-[12px] min-w-[80px]">`;
      }
      return `<td class="px-2 py-2">${field}</td>`;
    }).join('')}
    <td class="px-2 py-2">
      <div class="flex gap-1 flex-col">
        <button onclick="guardarFila('${tabla}','${id}','${llamadoId}',decodeURIComponent('${colsStr}'))"
          class="bg-neutral-800 hover:bg-neutral-700 text-white px-2 py-1 rounded text-[11px] font-medium whitespace-nowrap">Guardar</button>
        <button onclick="cancelarFila('${tabla}','${id}')"
          class="bg-neutral-100 hover:bg-neutral-200 text-neutral-600 px-2 py-1 rounded text-[11px] font-medium">Cancelar</button>
      </div>
    </td>
  </tr>`;
}

function agregarFila(tabla, llamadoId, colsStr) {
  const cols = JSON.parse(colsStr);
  // Remover form anterior si existe
  document.getElementById(`form-row-${tabla}`)?.remove();
  const tbody = document.getElementById(`tbody-${tabla}`);
  const tr = document.createElement('tr');
  tr.id = `form-row-${tabla}`;
  tr.innerHTML = formFila(tabla, null, cols, llamadoId, false).replace(`<tr id="form-row-${tabla}"`, '<tr');
  tbody.appendChild(tr);
  tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function editarFila(tabla, rowId, colsStr, llamadoId) {
  const cols = JSON.parse(colsStr);
  // Obtener datos actuales de la fila
  sbGet(tabla, { id: rowId }).then(rows => {
    if (!rows.length) return;
    const r = rows[0];
    document.getElementById(`form-row-${tabla}`)?.remove();
    const existingRow = document.getElementById(`row-${rowId}`);
    if (!existingRow) return;
    const formHtml = formFila(tabla, r, cols, llamadoId, true);
    existingRow.insertAdjacentHTML('afterend', formHtml);
    existingRow.classList.add('hidden');
  });
}

function cancelarFila(tabla, rowId) {
  document.getElementById(`form-row-${tabla}`)?.remove();
  if (rowId) document.getElementById(`row-${rowId}`)?.classList.remove('hidden');
}

async function guardarFila(tabla, rowId, llamadoId, colsStr) {
  const cols = JSON.parse(colsStr);
  const btn  = event.target;
  loading(btn, true);
  try {
    const data = { llamado_id: llamadoId };

    for (const c of cols) {
      if (c.type === 'image') {
        // Subir archivos si hay
        const fileInput = document.getElementById(`fr-${tabla}-${c.k}-file`);
        const files     = fileInput?.files || [];
        let urls = val(`fr-${tabla}-${c.k}`).split(',').map(s=>s.trim()).filter(Boolean);
        for (const f of files) {
          const url = await sbUpload(f);
          urls.push(url);
        }
        data[c.k] = urls.join(',');
      } else if (c.type === 'number') {
        data[c.k] = parseInt(val(`fr-${tabla}-${c.k}`)) || 0;
      } else if (c.k === 'es_especial') {
        data[c.k] = val(`fr-${tabla}-${c.k}`) === 'true';
      } else {
        data[c.k] = val(`fr-${tabla}-${c.k}`);
      }
    }

    if (rowId) await sbUpdate(tabla, rowId, data);
    else       await sbInsert(tabla, data);

    toast('Guardado ✓');
    // Recargar la sección completa
    await recargarTabla(tabla, llamadoId, cols);
  } catch(e) { toast('Error: ' + e.message, 'err'); loading(btn, false); }
}

async function eliminarFila(tabla, rowId, llamadoId, colsStr) {
  const cols = JSON.parse(colsStr);
  confirm('Eliminar registro', '¿Eliminar este registro?', async () => {
    try {
      await sbDelete(tabla, rowId);
      toast('Registro eliminado');
      await recargarTabla(tabla, llamadoId, cols);
    } catch(e) { toast('Error: ' + e.message, 'err'); }
  });
}

async function recargarTabla(tabla, llamadoId, cols) {
  const rows   = await sbGet(tabla, { llamado_id: llamadoId }, 'orden');
  const tbody  = document.getElementById(`tbody-${tabla}`);
  if (!tbody) return;
  tbody.innerHTML = rows.length === 0
    ? `<tr><td colspan="${cols.length+1}" class="text-center text-neutral-400 italic py-4">Sin registros</td></tr>`
    : rows.map(r => filaTabla(tabla, r, cols, llamadoId)).join('');
}
